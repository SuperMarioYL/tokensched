name: demo

on:
  workflow_dispatch: {}
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build binary for the demo
        run: go build -o tokensched ./cmd/tokensched
      - name: Install ffmpeg + ttyd (vhs deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
      - name: Render demo.gif
        uses: charmbracelet/vhs-action@v2
        with:
          path: docs/demo.tape
          install-fonts: true
      - name: Commit rendered gif
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add assets/demo.gif
          git commit -m "chore: render demo gif" || echo "no change"
          git push || echo "nothing to push"
